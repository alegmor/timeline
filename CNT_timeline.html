<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Classical Nucleation Theory — A Timeline</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,300;0,400;0,500;0,600;1,400&family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:        #FFFFFF;
  --panel:     #F3F8FA;
  --panel-2:   #FBFDFE;
  --line:      #C9D8E0;
  --ink:       #14181B;   /* body text */
  --muted:     #4E6B7A;   /* secondary text */
  --head:      #0F2230;   /* headings */
  --cold:      #0E86A5;   /* cold accent: arrow, structure */
  --cold-soft: #CFE6EC;
  --superheat: #D96B1A;   /* warm accent: activation, critical events */
  --superheat-dim: rgba(217,107,26,.12);
}
*{ margin:0; padding:0; box-sizing:border-box; }
html,body{ height:100%; }
body{
  background:
    radial-gradient(1100px 500px at 78% -10%, rgba(14,134,165,.06), transparent 60%),
    radial-gradient(900px 600px at 8% 110%, rgba(217,107,26,.05), transparent 55%),
    var(--bg);
  color: var(--ink);
  font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
  font-weight: 400;
  overflow-x: hidden;
}
.slide{
  max-width: 1280px;
  margin: 0 auto;
  padding: 36px 56px 28px;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ---------- header ---------- */
header{ display:flex; align-items:baseline; justify-content:space-between; gap:24px; flex-wrap:wrap; }
.eyebrow{
  font-family:"IBM Plex Mono", monospace;
  font-size: 12px; letter-spacing:.18em; text-transform: uppercase;
  color: var(--cold);
}
h1{
  font-family:"Spectral", Georgia, serif;
  font-weight: 500;
  font-size: clamp(26px, 3.1vw, 38px);
  color: var(--head);
  line-height: 1.12;
  margin-top: 6px;
}
.question{
  font-family:"Spectral", Georgia, serif;
  font-style: italic;
  font-weight: 400;
  color: var(--muted);
  font-size: clamp(14px, 1.35vw, 17px);
  max-width: 420px;
  text-align: right;
  border-right: 2px solid var(--superheat);
  padding-right: 14px;
}
.question strong{ color: var(--superheat); font-weight: 500; }

/* ---------- arrow timeline ---------- */
.track-wrap{ margin: 26px 0 4px; }
.track{
  position: relative;
  height: 168px;
  --arrow-y: 84px;
  --arrow-h: 16px;
  --head-w: 46px;
}
.arrow-body{
  position:absolute;
  left:0; right: var(--head-w);
  top: calc(var(--arrow-y) - var(--arrow-h)/2);
  height: var(--arrow-h);
  background: linear-gradient(90deg, #EDF4F7, var(--cold-soft));
  border: 1px solid var(--line);
  border-right: none;
  border-radius: 8px 0 0 8px;
}
.arrow-head{
  position:absolute;
  right: 0;
  top: calc(var(--arrow-y) - 21px);
  width: var(--head-w);
  height: 42px;
  background: var(--cold-soft);
  clip-path: polygon(0 0, 100% 50%, 0 100%);
}
.track-fill{
  position:absolute;
  left:2px;
  top: calc(var(--arrow-y) - var(--arrow-h)/2 + 2px);
  height: calc(var(--arrow-h) - 4px);
  background: linear-gradient(90deg, rgba(14,134,165,.25), var(--cold));
  border-radius: 6px 3px 3px 6px;
  transition: width .45s cubic-bezier(.4,.1,.2,1);
  pointer-events:none;
}
.node{
  position:absolute; top:0; bottom:0;
  transform: translateX(-50%);
  width: 116px;
  background:none; border:none; cursor:pointer;
  color: inherit; font: inherit;
}
.node:focus-visible{ outline: 2px solid var(--cold); border-radius: 8px; outline-offset: 2px; }
.node .bubble{
  position:absolute;
  left:50%; top: var(--arrow-y);
  transform: translate(-50%,-50%);
  width: 13px; height: 13px;
  border-radius: 50%;
  border: 1.5px solid var(--cold);
  background: var(--bg);
  transition: all .35s cubic-bezier(.34,1.4,.5,1);
  z-index: 2;
}
.node .label{
  position:absolute;
  left:50%; transform: translateX(-50%);
  width: 116px;
  text-align:center;
  line-height: 1.25;
}
.node .label .year{
  display:block;
  font-family:"IBM Plex Mono", monospace;
  font-size: 12.5px;
  color: var(--muted);
  transition: color .25s;
}
.node .label .who{
  display:block;
  font-size: 12px;
  font-weight: 400;
  color: var(--muted);
  transition: color .25s;
  margin-top: 1px;
}
.node.top .label{ bottom: calc(100% - var(--arrow-y) + 16px); }
.node.bottom .label{ top: calc(var(--arrow-y) + 18px); }
.node::after{
  content:"";
  position:absolute; left:50%; transform:translateX(-50%);
  width:1px; background: var(--line);
  transition: background .25s;
}
.node.top::after{    top: calc(var(--arrow-y) - 40px); height: 28px; }
.node.bottom::after{ top: calc(var(--arrow-y) + 12px); height: 28px; }

.node:hover .bubble{ transform: translate(-50%,-50%) scale(1.35); border-color: var(--head); }
.node:hover .label .year, .node:hover .label .who{ color: var(--ink); }

/* the selected embryo crosses R* and inflates */
.node.active .bubble{
  width: 25px; height: 25px;
  border-color: var(--superheat);
  background: radial-gradient(circle at 35% 30%, rgba(217,107,26,.45), rgba(217,107,26,.06) 65%);
  box-shadow: 0 0 14px rgba(217,107,26,.35);
}
.node.active .bubble::after{
  content:"";
  position:absolute; inset:-7px;
  border-radius:50%;
  border:1px dashed rgba(217,107,26,.55);
  animation: ringIn .4s ease-out;
}
.node.active .label .year{ color: var(--superheat); font-weight:500; }
.node.active .label .who{ color: var(--head); font-weight: 500; }
.node.active::after{ background: rgba(217,107,26,.55); }
@keyframes ringIn{ from{ transform:scale(.6); opacity:0; } to{ transform:scale(1); opacity:1; } }

/* ---------- detail panel ---------- */
.panel{
  margin-top: 10px;
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: 14px;
  padding: 26px 34px 24px;
  display: grid;
  grid-template-columns: minmax(0, 1.45fr) minmax(0, 1fr);
  gap: 8px 40px;
  min-height: 300px;
  animation: fadeUp .35s ease-out;
}
@keyframes fadeUp{ from{ opacity:0; transform: translateY(8px);} to{ opacity:1; transform:none;} }
.panel h2{
  grid-column: 1 / -1;
  font-family:"Spectral", Georgia, serif;
  font-weight: 500;
  font-size: clamp(20px, 2.1vw, 26px);
  color: var(--head);
  display:flex; align-items:baseline; gap:14px; flex-wrap:wrap;
  margin-bottom: 10px;
}
.panel h2 .tag{
  font-family:"IBM Plex Mono", monospace;
  font-size: 11.5px; letter-spacing:.14em; text-transform:uppercase;
  color: var(--superheat);
  background: var(--superheat-dim);
  border: 1px solid rgba(217,107,26,.35);
  padding: 3px 10px; border-radius: 20px;
  font-weight: 500;
}
.panel .body{ font-size: 15.5px; line-height: 1.62; color: var(--ink); }
.panel .body p + p{ margin-top: 10px; }
.panel .body em{ color: #0A5D75; font-style: normal; font-weight: 600; }
.panel .body .terms{
  margin-top: 10px;
  font-size: 14px;
  line-height: 1.7;
  color: var(--muted);
  border-left: 3px solid var(--cold-soft);
  padding-left: 14px;
}
.panel .body .terms i{ font-family:"Spectral", Georgia, serif; color: var(--head); font-size: 15px; }
.aside{ display:flex; flex-direction:column; gap:12px; }
.eq{
  font-family:"Spectral", Georgia, serif;
  font-size: 17.5px;
  color: var(--head);
  background: var(--panel-2);
  border: 1px solid var(--line);
  border-left: 3px solid var(--cold);
  border-radius: 8px;
  padding: 12px 16px;
  line-height: 1.55;
}
.eq .lbl{
  display:block;
  font-family:"IBM Plex Mono", monospace;
  font-size: 10.5px; letter-spacing:.16em; text-transform:uppercase;
  color: var(--muted); margin-bottom: 5px;
}
.eq i{ font-style: italic; }
.fig{
  background: #FFFFFF;
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 10px 12px 8px;
}
.fig svg{ display:block; width:100%; height:auto; }
.fig .cap{
  font-size: 12px; line-height: 1.5;
  color: var(--muted);
  padding: 6px 4px 2px;
}

/* ---------- footer / controls ---------- */
footer{
  margin-top: 14px;
  display:flex; justify-content:space-between; align-items:center;
  font-family:"IBM Plex Mono", monospace;
  font-size: 12px; color: var(--muted);
}
.controls{ display:flex; gap:10px; }
.controls button{
  background: var(--panel); color: var(--ink);
  border: 1px solid var(--line); border-radius: 8px;
  padding: 7px 16px; cursor: pointer;
  font-family: inherit; font-size: 12px;
  transition: all .2s;
}
.controls button:hover{ border-color: var(--cold); color: var(--head); }
.controls button:focus-visible{ outline: 2px solid var(--cold); }
.counter b{ color: var(--cold); font-weight: 500; }

@media (max-width: 900px){
  .slide{ padding: 28px 20px; }
  .question{ text-align:left; border-right:none; border-left:2px solid var(--superheat); padding: 0 0 0 14px; }
  .track{ height:auto; display:flex; flex-wrap:wrap; gap:6px; }
  .arrow-body, .arrow-head, .track-fill{ display:none; }
  .node{ position:static; transform:none; width:auto;
         display:flex; align-items:center; gap:8px;
         background:var(--panel); border:1px solid var(--line); border-radius:20px; padding:6px 12px; }
  .node::after{ display:none; }
  .node .bubble{ position:static; transform:none; }
  .node.active .bubble{ width:16px; height:16px; }
  .node .label{ position:static; transform:none; width:auto; text-align:left; }
  .node .label .year, .node .label .who{ display:inline; margin:0 3px 0 0; }
  .panel{ grid-template-columns: 1fr; }
}
@media (prefers-reduced-motion: reduce){
  *{ animation: none !important; transition: none !important; }
}
</style>
</head>
<body>
<div class="slide">

  <header>
    <div>
      <div class="eyebrow">Literature context · Nucleation theory</div>
      <h1>Classical Nucleation Theory: a century of one question</h1>
    </div>
    <div class="question">
      <strong>How large must a vapour embryo grow before it becomes stable and keeps growing?</strong>
    </div>
  </header>

  <div class="track-wrap">
    <div class="track" id="track" role="tablist" aria-label="CNT timeline">
      <div class="arrow-body"></div>
      <div class="arrow-head"></div>
      <div class="track-fill" id="fill"></div>
    </div>
  </div>

  <section class="panel" id="panel" role="tabpanel" aria-live="polite"></section>

  <footer>
    <div class="counter"><b id="idx">1</b> / <span id="total"></span> &nbsp;·&nbsp; use ← → keys or click a node</div>
    <div class="controls">
      <button id="prev" type="button">← Previous</button>
      <button id="next" type="button">Next →</button>
    </div>
  </footer>

</div>

const EVENTS = [

    body: `<p>Gibbs establishes the thermodynamics of heterogeneous systems: creating a vapour embryo inside a liquid costs <em>surface</em> free energy (\u223c<i>R</i>\u00b2) but releases <em>bulk</em> free energy (\u223c<i>R</i>\u00b3). Their competition produces a maximum of \u0394<i>G</i>(<i>R</i>) at the critical radius <i>R<sub>c</sub></i>: embryos below <i>R<sub>c</sub></i> shrink, embryos above it grow spontaneously.</p>

    <p>The insight is that nucleation is an <em>activated process</em>: the metastable liquid does not fail all at once; it waits for a rare, sufficiently large fluctuation. The barrier \u0394<i>G</i>* sets the energetic cost, but a kinetic prefactor is still needed to quantify how often critical nuclei form.</p>`,
    eqLabel: "Rate as an activated process",
    eq: "<i>J</i> \u221d exp(\u2212\u0394<i>G</i>* / <i>k<sub>B</sub>T</i>)"
  },
  {
    year: "1935",
    who: "Becker & D\u00f6ring",
    tag: "Cluster kinetics",
    title: "Becker & D\u00f6ring — the molecular traffic of clusters",
    body: `<p>Becker and D\u00f6ring treat nucleation as a stochastic process in cluster-size space: clusters gain or lose <em>one molecule at a time</em>, and a master equation describes the evolution of the cluster population. At equilibrium the population follows a <em>Boltzmann distribution</em> over formation free energies.</p>
    <div class="terms">
      <i>n<sub>i</sub></i> &nbsp;number of clusters containing <i>i</i> molecules &nbsp;\u00b7&nbsp;
      <i>\u03b2<sub>i</sub></i> &nbsp;attachment rate (molecules joining an <i>i</i>-cluster) &nbsp;\u00b7&nbsp;
      <i>\u03b1<sub>i</sub></i> &nbsp;detachment rate &nbsp;\u00b7&nbsp;
      <i>\u0394G<sub>i</sub></i> &nbsp;formation free energy of an <i>i</i>-cluster &nbsp;\u00b7&nbsp;
      <i>k<sub>B</sub>T</i> &nbsp;thermal energy.
    </div>
    <p>The attachment rate \u03b2<sub>i</sub> itself comes from kinetic theory: it is the impingement flux of molecules onto the cluster surface, computed from the <em>Maxwell\u2013Boltzmann velocity distribution</em>. (The cluster populations follow a Boltzmann distribution in energy; Maxwell\u2013Boltzmann refers to the molecular velocities that set \u03b2<sub>i</sub>.)</p>`,
    eqLabel: "Master equation and equilibrium distribution",
    eq: "d<i>n<sub>i</sub></i>/d<i>t</i> = \u03b2<sub><i>i</i>\u22121</sub><i>n</i><sub><i>i</i>\u22121</sub> + \u03b1<sub><i>i</i>+1</sub><i>n</i><sub><i>i</i>+1</sub> \u2212 (\u03b2<sub>i</sub> + \u03b1<sub>i</sub>)<i>n<sub>i</sub></i>",
    eq2Label: "Equilibrium cluster population",
    eq2: "<i>n<sub>i</sub></i><sup>eq</sup> \u221d exp(\u2212\u0394<i>G<sub>i</sub></i> / <i>k<sub>B</sub>T</i>)"
  },
  {
    year: "1942",
    who: "Zeldovich",
    tag: "Non-equilibrium correction",
    title: "Zeldovich — diffusion over the barrier",
    body: `<p>For large clusters, adding one molecule is a small relative change, so the discrete master equation becomes a continuous <em>Fokker\u2013Planck equation</em>: the cluster size performs a random walk in size space, with drift <i>A</i>(<i>n</i>) \u221d \u2212d\u0394<i>G</i>/d<i>n</i> (shrink below <i>n<sub>c</sub></i>, grow above it) and diffusion <i>B</i>(<i>n</i>) from random attachment and detachment.</p>
    <p>At steady state, a constant flux of clusters crosses the barrier: this flux <em>is</em> the nucleation rate. The <em>Zeldovich factor Z</em> measures the flatness of the barrier top \u2014 the width \u0394<i>n</i> over which clusters wander almost freely \u2014 and corrects the equilibrium population for the depletion caused by supercritical growth. CNT is therefore a <em>non-equilibrium</em> theory built on an underlying stochastic process.</p>`,
    eqLabel: "Nucleation rate",
    eq: "<i>J</i> = \u03c1<i>Z</i>\u03c9 exp(\u2212\u0394<i>G</i>* / <i>k<sub>B</sub>T</i>)",
    eq2Label: "Fokker\u2013Planck equation in size space",
    eq2: "\u2202<i>f</i>/\u2202<i>t</i> = \u2212\u2202<sub>n</sub>[<i>A</i>(<i>n</i>)<i>f</i>] + \u00bd\u2202<sup>2</sup><sub>n</sub>[<i>B</i>(<i>n</i>)<i>f</i>]",
    fig: FIG_ZELDOVICH,
    figCap: "The cluster size random-walks up the barrier; the steady flux of clusters through the Zeldovich zone \u0394n is the rate J."
  },
  {
    year: "1949",
    who: "Tolman",
    tag: "Curvature correction",
    title: "Tolman — surface tension is not a constant",
    body: `<p>Tolman shows that the surface tension of a strongly curved interface differs from the planar value. The correction is set by the <em>Tolman length \u03b4</em>: the distance between the <em>equimolar dividing surface z<sub>e</sub></em> (where the excess density vanishes) and the <em>surface of tension z<sub>s</sub></em> (where the mechanical tension acts). For simple liquids, \u03b4 is of order one molecular diameter.</p>
    <p>The real interface is <em>diffuse</em>, not a sharp step: in descriptions based on a Helmholtz free-energy functional, the two surfaces can be computed directly from the density profile \u03c1(<i>z</i>). For a critical nucleus a few nanometres wide, \u03c3 falls 5\u20137% below \u03c3<sub>\u221e</sub>; because \u03c3 enters the barrier as \u03c3\u00b3 inside an exponential, this changes the predicted rate by orders of magnitude.</p>`,
    eqLabel: "Curvature-corrected surface tension",
    eq: "\u03c3(<i>R</i>) = \u03c3<sub>\u221e</sub>(1 \u2212 2\u03b4/<i>R</i> + \u2026), \u2003 \u03b4 = <i>z<sub>e</sub></i> \u2212 <i>z<sub>s</sub></i>",
    eq2Label: "Helmholtz free-energy functional (diffuse interface)",
    eq2: "<i>F</i>[\u03c1] = \u222b [ <i>f</i>\u2080(\u03c1) + (\u03ba/2)|\u2207\u03c1|\u00b2 ] d<i>V</i>",
    fig: FIG_TOLMAN,
    figCap: "Sharp step assumed by the capillarity approximation (dashed) vs the real diffuse profile (solid). \u03b4 is the offset between the two dividing surfaces."
  },
  {
    year: "1970\u201392",
    who: "Skripov & Baidakov",
    tag: "Cryogenic experiments",
    title: "Skripov & Baidakov — CNT meets cryogenic data",
    body: `<p>Systematic superheat-limit experiments on cryogenic liquids provide the decisive test, and also justify the homogeneous framework: for contact angles \u03b8 < 68\u00b0, heterogeneous nucleation is negligible at rates <i>J</i> \u2273 10\u00b3 m\u207b\u00b3s\u207b\u00b9 \u2014 and cryogens wet common materials almost completely (\u03b8 < 10\u00b0 for N\u2082 and O\u2082, \u03b8 \u2248 0\u00b0 for H\u2082), with low dissolved-gas content.</p>
    <p>Predicted superheat temperatures differ from measurements by about <em>2.4%</em>; including the Tolman curvature correction (\u03c3 of the critical nucleus 5\u20137% below planar) brings theory and experiment into agreement within their combined uncertainties. At low rates (<i>J</i> < 1.5\u00d710\u2076 m\u207b\u00b3s\u207b\u00b9) measured rates deviate \u2014 attributed to <em>ionising radiation</em>: cosmic rays and natural radioactivity seed vapour nuclei in the superheated liquid.</p>`,
    eqLabel: "Residual accuracy of corrected CNT",
    eq: "superheat limit: theory vs experiment \u2248 2.4%"
  },
  {
    year: "1995\u201398",
    who: "Non-isothermal CNT",
    tag: "Thermal & non-equilibrium kinetics",
    title: "McGraw \u00b7 Reguera — beyond isothermal, equilibrium kinetics",
    body: `<p>The isothermal approximation breaks down for small clusters: the <em>latent heat</em> released by each molecular attachment is comparable to the cluster's own energy fluctuations. McGraw & LaViolette therefore extend the Fokker\u2013Planck description with the cluster <em>energy as a second state variable</em>, deriving a corrected evaporation rate that satisfies detailed balance.</p>
    <p>Reguera & Rub\u00ed address the complementary limit of high supersaturation, where clusters grow faster than they equilibrate: deriving the drift and diffusion coefficients from <em>non-equilibrium thermodynamics</em> restores consistency with the equilibrium distribution. These thermal corrections matter for cryogenic fluids, where latent-heat effects are relatively strong and may contribute to the observed deviations at low nucleation rates.</p>`,
    eqLabel: "Energy becomes a state variable",
    eq: "<i>f</i>(<i>n</i>, <i>t</i>) \u27f6 <i>f</i>(<i>n</i>, <i>E</i>, <i>t</i>)"
  },
  {
    year: "2015",
    who: "Schweizer & \u00d6ttinger",
    tag: "Unified extension",
    title: "Schweizer & \u00d6ttinger — a unified mesoscopic nucleation theory",
    body: `<p>The corrections accumulated over the century \u2014 non-equilibrium kinetics, thermal effects, inertia \u2014 are unified in a framework that describes the nucleus through <em>three coupled state variables</em>: size, momentum, and energy.</p>
    <p>Derived from thermodynamic first principles using the GENERIC formalism, the approach maps atomistic details onto an extended mesoscopic Fokker\u2013Planck equation. It reduces the 3\u20135 orders-of-magnitude discrepancy between standard CNT predictions and molecular-dynamics results \u2014 setting the accuracy standard that mesoscopic nucleation models must meet.</p>`,
    eqLabel: "Extended cluster state",
    eq: "<i>f</i>(<i>n</i>, <i>t</i>) \u27f6 <i>f</i>(<i>n</i>, <i>p</i>, <i>E</i>, <i>t</i>)"
  }
];

/* ---------- build ---------- */

const track = document.getElementById("track");
const panel = document.getElementById("panel");
const fill  = document.getElementById("fill");
document.getElementById("total").textContent = EVENTS.length;
let current = 0;

EVENTS.forEach((ev, i) => {
  const btn = document.createElement("button");
  btn.className = "node " + (i % 2 === 0 ? "top" : "bottom");
  btn.setAttribute("role","tab");
  btn.setAttribute("aria-label", ev.year + " " + ev.who);
  const pct = EVENTS.length > 1 ? (i/(EVENTS.length-1))*86 + 4 : 50;
  btn.style.left = pct + "%";
  btn.dataset.pct = pct;
  btn.innerHTML = `<span class="bubble"></span><span class="label"><span class="year">${ev.year}</span><span class="who">${ev.who}</span></span>`;
  btn.addEventListener("click", () => select(i));
  track.appendChild(btn);
});

function select(i){
  current = (i + EVENTS.length) % EVENTS.length;
  const ev = EVENTS[current];
  document.querySelectorAll(".node").forEach((n,k)=> n.classList.toggle("active", k===current));
  const activeNode = document.querySelectorAll(".node")[current];
  fill.style.width = "calc(" + activeNode.dataset.pct + "% - 2px)";
  document.getElementById("idx").textContent = current+1;
  panel.style.animation = "none"; panel.offsetHeight; panel.style.animation = "";

  let aside = `<div class="eq"><span class="lbl">${ev.eqLabel}</span>${ev.eq}</div>`;
  if(ev.eq2) aside += `<div class="eq"><span class="lbl">${ev.eq2Label}</span>${ev.eq2}</div>`;
  if(ev.fig) aside += `<div class="fig">${ev.fig}<div class="cap">${ev.figCap || ""}</div></div>`;

  panel.innerHTML = `
    <h2>${ev.title} <span class="tag">${ev.tag}</span></h2>
    <div class="body">${ev.body}</div>
    <div class="aside">${aside}</div>`;
}

document.getElementById("prev").addEventListener("click", ()=>select(current-1));
document.getElementById("next").addEventListener("click", ()=>select(current+1));
document.addEventListener("keydown", e=>{
  if(e.key==="ArrowRight") select(current+1);
  if(e.key==="ArrowLeft")  select(current-1);
});

select(0);
</script>
</body>
