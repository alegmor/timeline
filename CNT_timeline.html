<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Classical Nucleation Theory — A Timeline</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:        #FFFFFF;
  --panel:     #EEF1F8;
  --panel-2:   #F8FAFE;
  --line:      #C7D0E0;
  --ink:       #1B2233;   /* body text */
  --muted:     #384259;   /* secondary text */
  --head:      #0D2659;   /* headings */
  --cold:      #045073;   /* cold accent: arrow, structure */
  --cold-soft: #CBD8EC;
  --superheat: #EC5858;   /* warm accent: activation, critical events */
  --superheat-dim: rgba(236,88,88,.12);
}
*{ margin:0; padding:0; box-sizing:border-box; }
html,body{ height:100%; }
body{
  background:
    radial-gradient(1100px 500px at 78% -10%, rgba(4,80,115,.06), transparent 60%),
    radial-gradient(900px 600px at 8% 110%, rgba(236,88,88,.05), transparent 55%),
    var(--bg);
  color: var(--ink);
  font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
  font-weight: 400;
  overflow-x: hidden;
}
.slide{
  max-width: 1280px;
  margin: 0 auto;
  padding: 36px 56px 28px;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ---------- header ---------- */
header{ display:flex; align-items:baseline; justify-content:space-between; gap:24px; flex-wrap:wrap; }
.eyebrow{
  font-family:"IBM Plex Mono", monospace;
  font-size: 12px; letter-spacing:.18em; text-transform: uppercase;
  color: var(--cold);
}
h1{
  font-family:"IBM Plex Sans", "Segoe UI", sans-serif;
  font-weight: 700;
  font-size: clamp(26px, 3.1vw, 38px);
  color: var(--head);
  line-height: 1.12;
  margin-top: 6px;
}
.question{
  font-family:"IBM Plex Sans", "Segoe UI", sans-serif;
  font-style: italic;
  font-weight: 400;
  color: var(--muted);
  font-size: clamp(14px, 1.35vw, 17px);
  max-width: 420px;
  text-align: right;
  border-right: 2px solid var(--superheat);
  padding-right: 14px;
}
.question strong{ color: var(--superheat); font-weight: 500; }

/* ---------- arrow timeline ---------- */
.track-wrap{ margin: 26px 0 4px; }
.track{
  position: relative;
  height: 168px;
  --arrow-y: 84px;
  --arrow-h: 16px;
  --head-w: 46px;
}
.arrow-body{
  position:absolute;
  left:0; right: var(--head-w);
  top: calc(var(--arrow-y) - var(--arrow-h)/2);
  height: var(--arrow-h);
  background: linear-gradient(90deg, #E9EEF6, var(--cold-soft));
  border: 1px solid var(--line);
  border-right: none;
  border-radius: 8px 0 0 8px;
}
.arrow-head{
  position:absolute;
  right: 0;
  top: calc(var(--arrow-y) - 21px);
  width: var(--head-w);
  height: 42px;
  background: var(--cold-soft);
  clip-path: polygon(0 0, 100% 50%, 0 100%);
}
.track-fill{
  position:absolute;
  left:2px;
  top: calc(var(--arrow-y) - var(--arrow-h)/2 + 2px);
  height: calc(var(--arrow-h) - 4px);
  background: linear-gradient(90deg, rgba(4,80,115,.25), var(--cold));
  border-radius: 6px 3px 3px 6px;
  transition: width .45s cubic-bezier(.4,.1,.2,1);
  pointer-events:none;
}
.node{
  position:absolute; top:0; bottom:0;
  transform: translateX(-50%);
  width: 116px;
  background:none; border:none; cursor:pointer;
  color: inherit; font: inherit;
}
.node:focus-visible{ outline: 2px solid var(--cold); border-radius: 8px; outline-offset: 2px; }
.node .bubble{
  position:absolute;
  left:50%; top: var(--arrow-y);
  transform: translate(-50%,-50%);
  width: 13px; height: 13px;
  border-radius: 50%;
  border: 1.5px solid var(--cold);
  background: var(--bg);
  transition: all .35s cubic-bezier(.34,1.4,.5,1);
  z-index: 2;
}
.node .label{
  position:absolute;
  left:50%; transform: translateX(-50%);
  width: 116px;
  text-align:center;
  line-height: 1.25;
}
.node .label .year{
  display:block;
  font-family:"IBM Plex Mono", monospace;
  font-size: 12.5px;
  color: var(--muted);
  transition: color .25s;
}
.node .label .who{
  display:block;
  font-size: 12px;
  font-weight: 400;
  color: var(--muted);
  transition: color .25s;
  margin-top: 1px;
}
.node.top .label{ bottom: calc(100% - var(--arrow-y) + 16px); }
.node.bottom .label{ top: calc(var(--arrow-y) + 18px); }
.node::after{
  content:"";
  position:absolute; left:50%; transform:translateX(-50%);
  width:1px; background: var(--line);
  transition: background .25s;
}
.node.top::after{    top: calc(var(--arrow-y) - 40px); height: 28px; }
.node.bottom::after{ top: calc(var(--arrow-y) + 12px); height: 28px; }

.node:hover .bubble{ transform: translate(-50%,-50%) scale(1.35); border-color: var(--head); }
.node:hover .label .year, .node:hover .label .who{ color: var(--ink); }

/* the selected embryo crosses R* and inflates */
.node.active .bubble{
  width: 25px; height: 25px;
  border-color: var(--superheat);
  background: radial-gradient(circle at 35% 30%, rgba(236,88,88,.45), rgba(236,88,88,.06) 65%);
  box-shadow: 0 0 14px rgba(236,88,88,.35);
}
.node.active .bubble::after{
  content:"";
  position:absolute; inset:-7px;
  border-radius:50%;
  border:1px dashed rgba(236,88,88,.55);
  animation: ringIn .4s ease-out;
}
.node.active .label .year{ color: var(--superheat); font-weight:500; }
.node.active .label .who{ color: var(--head); font-weight: 500; }
.node.active::after{ background: rgba(236,88,88,.55); }
@keyframes ringIn{ from{ transform:scale(.6); opacity:0; } to{ transform:scale(1); opacity:1; } }

/* ---------- detail panel ---------- */
.panel{
  margin-top: 10px;
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: 14px;
  padding: 26px 34px 24px;
  display: grid;
  grid-template-columns: minmax(0, 1.45fr) minmax(0, 1fr);
  gap: 8px 40px;
  min-height: 300px;
  animation: fadeUp .35s ease-out;
}
@keyframes fadeUp{ from{ opacity:0; transform: translateY(8px);} to{ opacity:1; transform:none;} }
.panel h2{
  grid-column: 1 / -1;
  font-family:"IBM Plex Sans", "Segoe UI", sans-serif;
  font-weight: 600;
  font-size: clamp(20px, 2.1vw, 26px);
  color: var(--head);
  display:flex; align-items:baseline; gap:14px; flex-wrap:wrap;
  margin-bottom: 10px;
}
.panel h2 .tag{
  font-family:"IBM Plex Mono", monospace;
  font-size: 11.5px; letter-spacing:.14em; text-transform:uppercase;
  color: var(--superheat);
  background: var(--superheat-dim);
  border: 1px solid rgba(236,88,88,.35);
  padding: 3px 10px; border-radius: 20px;
  font-weight: 500;
}
.panel .body{ font-size: 15.5px; line-height: 1.62; color: var(--ink); }
.panel .body p + p{ margin-top: 10px; }
.panel .body em{ color: #033B54; font-style: normal; font-weight: 600; }
.panel .body .terms{
  margin-top: 10px;
  font-size: 14px;
  line-height: 1.7;
  color: var(--muted);
  border-left: 3px solid var(--cold-soft);
  padding-left: 14px;
}
.panel .body .terms i{ font-family:"IBM Plex Sans", "Segoe UI", sans-serif; color: var(--head); font-size: 15px; }
.aside{ display:flex; flex-direction:column; gap:12px; }
.eq{
  font-family:"IBM Plex Sans", "Segoe UI", sans-serif;
  font-size: 17.5px;
  color: var(--head);
  background: var(--panel-2);
  border: 1px solid var(--line);
  border-left: 3px solid var(--cold);
  border-radius: 8px;
  padding: 12px 16px;
  line-height: 1.55;
}
.eq .lbl{
  display:block;
  font-family:"IBM Plex Mono", monospace;
  font-size: 10.5px; letter-spacing:.16em; text-transform:uppercase;
  color: var(--muted); margin-bottom: 5px;
}
.eq i{ font-style: italic; }
.fig{
  background: #FFFFFF;
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 10px 12px 8px;
}
.fig svg{ display:block; width:100%; height:auto; }
.fig .cap{
  font-size: 12px; line-height: 1.5;
  color: var(--muted);
  padding: 6px 4px 2px;
}

/* ---------- reference line ---------- */
.panel .ref{
  grid-column: 1 / -1;
  margin-top: 16px;
  padding-top: 10px;
  border-top: 1px solid var(--line);
  font-size: 12.5px;
  line-height: 1.55;
  color: var(--muted);
}
.panel .ref .rlbl{
  font-family:"IBM Plex Mono", monospace;
  font-size: 10.5px; letter-spacing:.16em; text-transform:uppercase;
  color: var(--cold); margin-right: 8px;
}
.panel .ref a{ color: #033B54; text-decoration: none; border-bottom: 1px dotted #033B54; }
.panel .ref a:hover{ color: var(--head); }

/* ---------- data table (aside) ---------- */
.dtable{
  background: var(--panel-2);
  border: 1px solid var(--line);
  border-left: 3px solid var(--cold);
  border-radius: 8px;
  padding: 10px 12px;
}
.dtable .lbl{
  display:block;
  font-family:"IBM Plex Mono", monospace;
  font-size: 10.5px; letter-spacing:.16em; text-transform:uppercase;
  color: var(--muted); margin-bottom: 8px;
}
.dtable table{ width:100%; border-collapse: collapse; font-size: 12.8px; }
.dtable td{ padding: 5px 6px; vertical-align: top; border-bottom: 1px solid var(--cold-soft); line-height: 1.4; }
.dtable tr:last-child td{ border-bottom: none; }
.dtable td:first-child{ color: var(--head); font-weight: 500; white-space: nowrap; padding-right: 12px; }
.dtable td:last-child{ color: var(--muted); }
.dtable i{ font-style: italic; }

/* ---------- footer / controls ---------- */
footer{
  margin-top: 14px;
  display:flex; justify-content:space-between; align-items:center;
  font-family:"IBM Plex Mono", monospace;
  font-size: 12px; color: var(--muted);
}
.controls{ display:flex; gap:10px; }
.controls button{
  background: var(--panel); color: var(--ink);
  border: 1px solid var(--line); border-radius: 8px;
  padding: 7px 16px; cursor: pointer;
  font-family: inherit; font-size: 12px;
  transition: all .2s;
}
.controls button:hover{ border-color: var(--cold); color: var(--head); }
.controls button:focus-visible{ outline: 2px solid var(--cold); }
.counter b{ color: var(--cold); font-weight: 500; }

@media (max-width: 900px){
  .slide{ padding: 28px 20px; }
  .question{ text-align:left; border-right:none; border-left:2px solid var(--superheat); padding: 0 0 0 14px; }
  .track{ height:auto; display:flex; flex-wrap:wrap; gap:6px; }
  .arrow-body, .arrow-head, .track-fill{ display:none; }
  .node{ position:static; transform:none; width:auto;
         display:flex; align-items:center; gap:8px;
         background:var(--panel); border:1px solid var(--line); border-radius:20px; padding:6px 12px; }
  .node::after{ display:none; }
  .node .bubble{ position:static; transform:none; }
  .node.active .bubble{ width:16px; height:16px; }
  .node .label{ position:static; transform:none; width:auto; text-align:left; }
  .node .label .year, .node .label .who{ display:inline; margin:0 3px 0 0; }
  .panel{ grid-template-columns: 1fr; }
}
@media (prefers-reduced-motion: reduce){
  *{ animation: none !important; transition: none !important; }
}
</style>
</head>
<body>
<div class="slide">

  <header>
    <div>
      <div class="eyebrow">Literature context · Nucleation theory</div>
      <h1>Classical Nucleation Theory: a century of one question</h1>
    </div>
    <div class="question">
      <strong>How large must a vapour embryo grow before it becomes stable and keeps growing?</strong>
    </div>
  </header>

  <div class="track-wrap">
    <div class="track" id="track" role="tablist" aria-label="CNT timeline">
      <div class="arrow-body"></div>
      <div class="arrow-head"></div>
      <div class="track-fill" id="fill"></div>
    </div>
  </div>

  <section class="panel" id="panel" role="tabpanel" aria-live="polite"></section>

  <footer>
    <div class="counter"><b id="idx">1</b> / <span id="total"></span> &nbsp;·&nbsp; use ← → keys or click a node</div>
    <div class="controls">
      <button id="prev" type="button">← Previous</button>
      <button id="next" type="button">Next →</button>
    </div>
  </footer>

</div>

    title: "Gibbs — the work of forming a new phase",
    body: `<p>Gibbs establishes the thermodynamics of heterogeneous systems: creating a vapour embryo inside a liquid costs <em>surface</em> free energy (\u223c<i>R</i>\u00b2) but releases <em>bulk</em> free energy (\u223c<i>R</i>\u00b3). Their competition produces a maximum of \u0394<i>G</i>(<i>R</i>) at the critical radius <i>R<sub>c</sub></i>: embryos below <i>R<sub>c</sub></i> shrink, embryos above it grow spontaneously.</p>

    title: "Volmer & Weber — nucleation becomes a rate",
    body: `<p>Volmer and Weber turn Gibbs' static barrier into a <em>kinetic</em> statement: the number of embryos that cross the barrier per unit volume and time is proportional to a Boltzmann factor of the barrier height.</p>
    <p>The insight is that nucleation is an <em>activated process</em>: the metastable liquid does not fail all at once; it waits for a rare, sufficiently large fluctuation. The barrier \u0394<i>G</i>* sets the energetic cost, but a kinetic prefactor is still needed to quantify how often critical nuclei form.</p>`,

  {

    tag: "Cluster kinetics",
    title: "Becker & D\u00f6ring — the molecular traffic of clusters",
    body: `<p>Becker and D\u00f6ring treat nucleation as a stochastic process in cluster-size space: clusters gain or lose <em>one molecule at a time</em>, and a master equation describes the evolution of the cluster population. At equilibrium the population follows a <em>Boltzmann distribution</em> over formation free energies.</p>
    <div class="terms">

  {
    year: "1942",
    who: "Zeldovich",
    tag: "Non-equilibrium correction",
    title: "Zeldovich — diffusion over the barrier",
    body: `<p>Becker\u2013D\u00f6ring gives the <em>equilibrium</em> cluster distribution, but real nucleation is a steady <em>flow</em>: supercritical clusters keep growing and are removed, so the population near <i>n<sub>c</sub></i> is depleted below equilibrium. Zeldovich makes this quantitative. For large clusters, adding one molecule is a small relative change, so the discrete master equation becomes a continuous <em>Fokker\u2013Planck equation</em> \u2014 the cluster size performs a biased random walk in size space, with drift <i>A</i>(<i>n</i>) \u221d \u2212d\u0394<i>G</i>/d<i>n</i> (shrink below <i>n<sub>c</sub></i>, grow above it) and diffusion <i>B</i>(<i>n</i>) \u2248 \u03b2* from random attachment and detachment.</p>
    <p>At steady state a <em>constant flux</em> of clusters crosses the barrier, and that flux <em>is</em> the nucleation rate <i>J</i>. The <em>Zeldovich factor Z</em> is the single dimensionless number that converts the equilibrium picture into this steady-flux rate. It has three equivalent readings: (i) it measures the <em>curvature</em> of the barrier top, <i>Z</i> = [\u2212(1/2\u03c0<i>k<sub>B</sub>T</i>)\u00b7\u2202\u00b2\u0394<i>G</i>/\u2202<i>n</i>\u00b2]<sup>\u00bd</sup> at <i>n</i>=<i>n<sub>c</sub></i>; (ii) it fixes the <em>width</em> \u0394<i>n</i> = 1/(<i>Z</i>\u221a\u03c0) of the near-flat region where clusters wander by diffusion rather than drift; (iii) it is the factor (typically \u2248 0.01\u20130.1) by which the true steady-state population at the top sits <em>below</em> equilibrium. CNT is therefore a <em>non-equilibrium</em> theory built on an underlying stochastic process.</p>`,

    fig: FIG_ZELDOVICH,

    ref: "Ya. B. Zeldovich, \u201cOn the theory of new phase formation; cavitation,\u201d <i>Acta Physicochim. URSS</i> <b>18</b>, 1\u201322 (1943); <i>Zh. Eksp. Teor. Fiz.</i> <b>12</b>, 525 (1942)."

  {

    who: "Tolman",
    tag: "Curvature correction",
    title: "Tolman — surface tension is not a constant",
    body: `<p>The capillarity approximation takes \u03c3 = \u03c3<sub>\u221e</sub>, but for a nanometre embryo the choice of <em>where</em> the interface sits already matters. Minimising the <em>Helmholtz</em> work of formation at fixed <i>T</i>, <i>V</i> (with surface tension allowed to depend on the dividing-surface radius) gives a <em>generalized</em> Young\u2013Laplace balance, \u0394<i>p</i> = 2\u03b3(<i>R</i>)/<i>R</i> + d\u03b3/d<i>R</i>. The ordinary Laplace law \u0394<i>p</i> = 2\u03c3<sub>t</sub>/<i>R<sub>t</sub></i> is recovered only at the special <em>surface of tension</em>, where d\u03b3/d<i>R</i> = 0.</p>
    <p>Tolman shows the surface tension of a strongly curved interface differs from the planar value. The correction is set by the <em>Tolman length \u03b4</em>: the offset between the <em>equimolar dividing surface z<sub>e</sub></em> (where the excess density vanishes) and the <em>surface of tension z<sub>s</sub></em> (where the mechanical tension acts). For simple liquids \u03b4 is of order one molecular diameter, and it is exactly this \u03b4 that a diffuse-interface density profile \u03c1(<i>z</i>) makes computable. For a critical nucleus a few nanometres wide, \u03c3 falls 5\u20137% below \u03c3<sub>\u221e</sub>; because \u03c3 enters the barrier as \u03c3\u00b3 inside an exponential, this shifts the predicted rate by orders of magnitude \u2014 the dominant correction for cryogenic fluids.</p>`,

    body: `<p>Systematic superheat-limit experiments on cryogenic liquids provide the decisive test of CNT and justify the <em>homogeneous</em> framework: cryogens wet common materials almost completely and carry little dissolved gas, so heterogeneous nucleation is negligible at the measured rates. The table collects the quantitative outcome \u2014 uncorrected CNT is already close, and the Tolman curvature correction closes the residual gap. The deviation at low rates is not a failure of CNT but an external seeding channel: ionising radiation (cosmic rays, natural radioactivity) nucleates vapour in the superheated liquid.</p>`,

    title: "McGraw \u00b7 Reguera — beyond isothermal, equilibrium kinetics",
    body: `<p>The isothermal approximation breaks down for small clusters: the <em>latent heat</em> released by each molecular attachment is comparable to the cluster's own energy fluctuations. McGraw & LaViolette therefore extend the Fokker\u2013Planck description with the cluster <em>energy as a second state variable</em>, deriving a corrected evaporation rate that satisfies detailed balance.</p>

  btn.setAttribute("role","tab");
  btn.setAttribute("aria-label", ev.year + " " + ev.who);
  const pct = EVENTS.length > 1 ? (i/(EVENTS.length-1))*86 + 4 : 50;
  btn.style.left = pct + "%";
  btn.dataset.pct = pct;
  btn.innerHTML = `<span class="bubble"></span><span class="label"><span class="year">${ev.year}</span><span class="who">${ev.who}</span></span>`;
  btn.addEventListener("click", () => select(i));
  track.appendChild(btn);
});

function select(i){
  current = (i + EVENTS.length) % EVENTS.length;
  const ev = EVENTS[current];
  document.querySelectorAll(".node").forEach((n,k)=> n.classList.toggle("active", k===current));
  const activeNode = document.querySelectorAll(".node")[current];
  fill.style.width = "calc(" + activeNode.dataset.pct + "% - 2px)";
  document.getElementById("idx").textContent = current+1;
  panel.style.animation = "none"; panel.offsetHeight; panel.style.animation = "";

  let aside = `<div class="eq"><span class="lbl">${ev.eqLabel}</span>${ev.eq}</div>`;
  if(ev.eq2) aside += `<div class="eq"><span class="lbl">${ev.eq2Label}</span>${ev.eq2}</div>`;
  if(ev.eq3) aside += `<div class="eq"><span class="lbl">${ev.eq3Label}</span>${ev.eq3}</div>`;
  if(ev.table) aside += `<div class="dtable"><span class="lbl">${ev.tableLabel || ""}</span><table><tbody>${ev.table}</tbody></table></div>`;
  if(ev.fig) aside += `<div class="fig">${ev.fig}<div class="cap">${ev.figCap || ""}</div></div>`;

  const refHtml = ev.ref ? `<div class="ref"><span class="rlbl">Reference</span>${ev.ref}</div>` : "";

  panel.innerHTML = `
    <h2>${ev.title} <span class="tag">${ev.tag}</span></h2>
    <div class="body">${ev.body}</div>
    <div class="aside">${aside}</div>
    ${refHtml}`;
}

document.getElementById("prev").addEventListener("click", ()=>select(current-1));
document.getElementById("next").addEventListener("click", ()=>select(current+1));
document.addEventListener("keydown", e=>{
  if(e.key==="ArrowRight") select(current+1);
  if(e.key==="ArrowLeft")  select(current-1);
});

select(0);
</script>
</body>
</html>
